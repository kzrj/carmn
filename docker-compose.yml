services:
  postgres:
    image: postgres:16.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drom}
      POSTGRES_USER: ${POSTGRES_USER:-drom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drom} -d ${POSTGRES_DB:-drom}"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPYCACHEPREFIX: /cache/pycache
      POSTGRES_HOST: postgres
    volumes:
      - ./backend:/app
      - ./scripts:/scripts:ro
      - ./scripts/drom/parsed:/data/drom/parsed:ro
      - ./scripts/drom/marks:/data/drom/marks:ro
      - api_pycache:/cache/pycache
      - media_data:/app/media
      - /app/.pytest_cache
    depends_on:
      postgres:
        condition: service_healthy

  frontend-build:
    image: node:22
    working_dir: /src
    restart: "no"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./frontend:/src
      - front_node_modules:/src/node_modules
      - front_dist:/out
    command: >
      sh -c "[ -d node_modules/.bin ] || npm install &&
             npm run build &&
             rm -rf /out/* &&
             cp -r /src/dist/. /out/"

  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - front_dist:/usr/share/nginx/html:ro
      - media_data:/media:ro
    ports:
      - "8082:80"
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  postgres_data:
  front_dist:
  front_node_modules:
  api_pycache:
  media_data:
